<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saha Asistanı</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide İkonları -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Mobil cihazlarda alt çentik (safe area) boşlukları için */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
        
        /* Form elemanları için genel düzeltmeler */
        input, select, textarea { font-family: inherit; }
        
        /* Scrollbar gizleme (Daha şık görünüm) */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- YÜKLENİYOR EKRANI -->
    <div id="loading-screen" class="absolute inset-0 z-50 bg-slate-50 flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        <p class="mt-4 text-slate-500 font-medium">Uygulama yükleniyor...</p>
    </div>

    <!-- ANA UYGULAMA (Başlangıçta Gizli) -->
    <div id="app-container" class="hidden flex-col h-full">
        
        <!-- Üst Bilgi (Header) -->
        <header class="bg-blue-700 text-white shadow-md pt-safe shrink-0">
            <div class="px-4 py-4 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <i data-lucide="briefcase" class="h-6 w-6 text-blue-200"></i>
                    <h1 class="text-xl font-bold tracking-tight">Saha Asistanı</h1>
                </div>
                <div id="total-records-badge" class="text-xs font-medium bg-blue-800/50 px-2 py-1 rounded-full text-blue-100 border border-blue-600">
                    0 Kayıt
                </div>
            </div>
        </header>

        <!-- Ana İçerik Alanı -->
        <main class="flex-1 overflow-y-auto pb-24 relative">
            
            <!-- LİSTE SEKME İÇERİĞİ -->
            <div id="tab-list" class="p-4 space-y-4 max-w-3xl mx-auto block">
                
                <!-- Arama Çubuğu -->
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="h-5 w-5 text-slate-400"></i>
                    </div>
                    <input
                        type="text"
                        id="search-input"
                        class="block w-full pl-10 pr-10 py-3 border border-slate-200 rounded-xl leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm shadow-sm transition-shadow"
                        placeholder="Vaka No, Evrak veya Müşteri Ara..."
                    >
                    <button id="clear-search-btn" class="hidden absolute inset-y-0 right-0 pr-3 flex items-center">
                        <i data-lucide="x" class="h-5 w-5 text-slate-400 hover:text-slate-600"></i>
                    </button>
                </div>

                <!-- Kayıtların Listeleneceği Konteyner -->
                <div id="records-container" class="space-y-6">
                    <!-- JavaScript ile doldurulacak -->
                </div>
            </div>

            <!-- YENİ EKLE SEKME İÇERİĞİ -->
            <div id="tab-add" class="p-4 max-w-3xl mx-auto hidden">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-slate-50 px-5 py-4 border-b border-slate-200">
                        <h2 class="text-lg font-semibold text-slate-800 flex items-center">
                            <i data-lucide="plus" class="h-5 w-5 mr-2 text-blue-600"></i>
                            Yeni İş Kaydı
                        </h2>
                    </div>
                    
                    <form id="add-form" class="p-5 space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Vaka Numarası</label>
                                <input type="text" id="vakaNo" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Örn: VK-2023-1042">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Tarih</label>
                                <input type="date" id="tarih" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Müşteri / Lokasyon</label>
                            <input type="text" id="musteri" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Müşteri Adı veya Adres Özeti">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Yapılan İşlem / Açıklama</label>
                            <textarea id="aciklama" required rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-none" placeholder="Sahada yapılan işlemleri detaylandırın..."></textarea>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Evrak / Form No (Opsiyonel)</label>
                                <input type="text" id="evrakNo" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Servis Formu veya İrsaliye No">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">İşlem Durumu</label>
                                <select id="durum" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white">
                                    <option value="Tamamlandı">Tamamlandı</option>
                                    <option value="Devam Ediyor">Devam Ediyor</option>
                                    <option value="Bekliyor">Parça/Onay Bekliyor</option>
                                </select>
                            </div>
                        </div>

                        <div class="pt-4">
                            <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl shadow-sm transition-all focus:ring-4 focus:ring-blue-200 flex justify-center items-center">
                                <i data-lucide="check-circle" class="mr-2 h-5 w-5"></i> Kaydı Tamamla
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- İADE MODEMLER SEKME İÇERİĞİ -->
            <div id="tab-modems" class="p-4 max-w-3xl mx-auto hidden">
                
                <!-- Modem Ekleme Kartı -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                    <div class="bg-slate-50 px-5 py-4 border-b border-slate-200">
                        <h2 class="text-lg font-semibold text-slate-800 flex items-center">
                            <i data-lucide="router" class="h-5 w-5 mr-2 text-indigo-600"></i>
                            Vakaya Modem İşlemi Ekle
                        </h2>
                    </div>
                    
                    <form id="modem-form" class="p-5 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Kayıtlı Vaka Seçin</label>
                            <select id="modem-vaka-id" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white">
                                <option value="">Önce Vaka Seçin...</option>
                                <!-- JS ile Doldurulacak -->
                            </select>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Modem Seri No / Barkod</label>
                                <input type="text" id="modem-seri" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="Örn: S/N 123456789">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">İşlem Tipi</label>
                                <select id="modem-tip" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white">
                                    <option value="İade Alındı">İade Alındı (Müşteriden Alındı)</option>
                                    <option value="Değişim Yapıldı">Değişim Yapıldı (Eskisi Alındı)</option>
                                </select>
                            </div>
                        </div>

                        <!-- Link Ekleme Alanı -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Takip / Belge Linki (Opsiyonel)</label>
                            <input type="text" id="modem-link" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="Kargo veya Belge Linkini yapıştırın...">
                        </div>

                        <div class="pt-2">
                            <button type="submit" id="modem-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-xl shadow-sm transition-all focus:ring-4 focus:ring-indigo-200 flex justify-center items-center">
                                <i data-lucide="save" class="mr-2 h-5 w-5"></i> Vakaya Modemi Ekle
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Kaydedilen Modemler Listesi -->
                <div class="flex items-center justify-between mb-3 px-1">
                    <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider">İade/Değişim Alınanlar</h3>
                    <span id="modem-count-badge" class="text-xs font-medium bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full">0 Modem</span>
                </div>
                
                <div id="modems-container" class="space-y-3">
                    <!-- JS ile doldurulacak -->
                </div>
            </div>
        </main>

        <!-- Alt Gezinme Çubuğu -->
        <nav class="fixed bottom-0 w-full bg-white border-t border-slate-200 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-30 shrink-0">
            <div class="flex justify-around">
                <button id="nav-btn-list" class="flex-1 flex flex-col items-center py-3 px-1 transition-colors text-blue-600">
                    <i data-lucide="calendar" class="h-6 w-6 mb-1 stroke-2"></i>
                    <span class="text-[10px] font-semibold uppercase tracking-wider text-center">Günlük İşler</span>
                </button>
                
                <button id="nav-btn-add" class="flex-1 flex flex-col items-center py-3 px-1 transition-colors text-slate-500 hover:text-slate-900">
                    <i data-lucide="plus" class="h-6 w-6 mb-1 stroke-[1.5]"></i>
                    <span class="text-[10px] font-semibold uppercase tracking-wider text-center">Yeni Ekle</span>
                </button>

                <!-- YENİ EKLENEN İADE MODEM BUTONU -->
                <button id="nav-btn-modems" class="flex-1 flex flex-col items-center py-3 px-1 transition-colors text-slate-500 hover:text-slate-900">
                    <i data-lucide="router" class="h-6 w-6 mb-1 stroke-[1.5]"></i>
                    <span class="text-[10px] font-semibold uppercase tracking-wider text-center">İade Modem</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- DÜZENLEME MODALI (YENİ EKLENDİ) -->
    <div id="edit-modal" class="hidden fixed inset-0 z-[60] bg-slate-900/50 backdrop-blur-sm flex-col items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 w-full max-w-md overflow-hidden flex flex-col max-h-full">
            <div class="bg-slate-50 px-5 py-4 border-b border-slate-200 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-slate-800 flex items-center">
                    <i data-lucide="edit-2" class="h-5 w-5 mr-2 text-blue-600"></i>
                    Kaydı Düzenle
                </h2>
                <button id="cancel-edit-btn-top" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" class="h-5 w-5"></i>
                </button>
            </div>
            <div class="overflow-y-auto p-5">
                <form id="edit-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Vaka Numarası</label>
                            <input type="text" id="edit-vakaNo" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Tarih</label>
                            <input type="date" id="edit-tarih" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Müşteri / Lokasyon</label>
                        <input type="text" id="edit-musteri" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Yapılan İşlem / Açıklama</label>
                        <textarea id="edit-aciklama" required rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Evrak / Form No</label>
                            <input type="text" id="edit-evrakNo" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">İşlem Durumu</label>
                            <select id="edit-durum" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                <option value="Tamamlandı">Tamamlandı</option>
                                <option value="Devam Ediyor">Devam Ediyor</option>
                                <option value="Bekliyor">Parça/Onay Bekliyor</option>
                            </select>
                        </div>
                    </div>
                    <div class="pt-4 flex space-x-3">
                        <button type="button" id="cancel-edit-btn" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-3 px-4 rounded-xl transition-colors">İptal</button>
                        <button type="submit" id="edit-submit-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-xl shadow-sm transition-colors flex justify-center items-center">
                            Güncelle
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase ve Uygulama Mantığı -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Ayarları
        const myFirebaseConfig = {
            apiKey: "AIzaSyCX0GKxsXcZ6JElpPeDydoAJZlsZcL2Njs",
            authDomain: "teknofixsahatest.firebaseapp.com",
            projectId: "teknofixsahatest",
            storageBucket: "teknofixsahatest.firebasestorage.app",
            messagingSenderId: "56598029133",
            appId: "1:56598029133:web:3fed78e01fe7089c3c0d04",
            measurementId: "G-ETB9EWG7Y5"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' && Object.keys(__firebase_config).length > 0 ? JSON.parse(__firebase_config) : myFirebaseConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // State Yönetimi
        let currentUser = null;
        let records = [];
        let searchTerm = '';
        let deletingId = null;
        let editingId = null; // DÜZENLEME İÇİN EKLENDİ

        // DOM Elementleri
        const ui = {
            loadingScreen: document.getElementById('loading-screen'),
            appContainer: document.getElementById('app-container'),
            
            // Sekmeler
            tabList: document.getElementById('tab-list'),
            tabAdd: document.getElementById('tab-add'),
            tabModems: document.getElementById('tab-modems'),
            
            // Alt Butonlar
            navBtnList: document.getElementById('nav-btn-list'),
            navBtnAdd: document.getElementById('nav-btn-add'),
            navBtnModems: document.getElementById('nav-btn-modems'),
            
            recordsContainer: document.getElementById('records-container'),
            searchInput: document.getElementById('search-input'),
            clearSearchBtn: document.getElementById('clear-search-btn'),
            totalRecordsBadge: document.getElementById('total-records-badge'),
            
            // Vaka Ekleme Formu
            addForm: document.getElementById('add-form'),
            submitBtn: document.getElementById('submit-btn'),
            inpVaka: document.getElementById('vakaNo'),
            inpTarih: document.getElementById('tarih'),
            inpMusteri: document.getElementById('musteri'),
            inpAciklama: document.getElementById('aciklama'),
            inpEvrak: document.getElementById('evrakNo'),
            inpDurum: document.getElementById('durum'),

            // Modem Ekleme Formu & Listesi
            modemsContainer: document.getElementById('modems-container'),
            modemCountBadge: document.getElementById('modem-count-badge'),
            modemForm: document.getElementById('modem-form'),
            modemSubmitBtn: document.getElementById('modem-submit-btn'),
            modemVakaSelect: document.getElementById('modem-vaka-id'),
            modemSeri: document.getElementById('modem-seri'),
            modemTip: document.getElementById('modem-tip'),
            modemLink: document.getElementById('modem-link'),
            
            // DÜZENLEME MODALI DOM'LARI
            editModal: document.getElementById('edit-modal'),
            editForm: document.getElementById('edit-form'),
            editVaka: document.getElementById('edit-vakaNo'),
            editTarih: document.getElementById('edit-tarih'),
            editMusteri: document.getElementById('edit-musteri'),
            editAciklama: document.getElementById('edit-aciklama'),
            editEvrak: document.getElementById('edit-evrakNo'),
            editDurum: document.getElementById('edit-durum'),
            editSubmitBtn: document.getElementById('edit-submit-btn'),
            cancelEditBtn: document.getElementById('cancel-edit-btn'),
            cancelEditBtnTop: document.getElementById('cancel-edit-btn-top')
        };

        lucide.createIcons();
        ui.inpTarih.value = new Date().toISOString().split('T')[0];

        // --- 1. Yetkilendirme ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Yetkilendirme hatası:", error);
                ui.loadingScreen.innerHTML = `
                    <div class="text-center p-6 bg-red-50 rounded-xl border border-red-200 max-w-[90%] mx-auto shadow-sm">
                        <h3 class="text-lg font-bold text-red-700 mb-2">Giriş Hatası!</h3>
                        <p class="text-sm text-red-600 mb-4 font-mono">${error.message}</p>
                    </div>
                `;
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                ui.loadingScreen.classList.add('hidden');
                ui.appContainer.classList.remove('hidden');
                ui.appContainer.classList.add('flex');
                fetchRecords();
            }
        });

        // --- 2. Veri Çekme (ORTAK HAVUZ) ---
        function fetchRecords() {
            if (!currentUser) return;
            
            const recordsRef = collection(db, 'artifacts', appId, 'public', 'data', 'saha_gorevleri');
            
            onSnapshot(recordsRef, (snapshot) => {
                const data = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                records = data.sort((a, b) => b.createdAt - a.createdAt);
                ui.totalRecordsBadge.textContent = `${records.length} Kayıt`;
                
                // Veri gelince tüm arayüzü güncelle
                renderRecords();
                populateModemSelect();
                renderModems();
            }, (error) => {
                console.error("Veri çekme hatası:", error);
                alert("Veriler çekilemedi! Hata: " + error.message);
            });
        }

        // --- 3. UI Yardımcı Fonksiyonları ---
        function switchTab(tabName) {
            try {
                const tabs = ['list', 'add', 'modems'];
                
                tabs.forEach(name => {
                    const isTab = name === tabName;
                    const tabEl = ui[`tab${name.charAt(0).toUpperCase() + name.slice(1)}`];
                    const btnEl = ui[`navBtn${name.charAt(0).toUpperCase() + name.slice(1)}`];
                    
                    if (tabEl) {
                        if (isTab) tabEl.classList.remove('hidden');
                        else tabEl.classList.add('hidden');
                    }
                    
                    if (btnEl) {
                        const activeColor = name === 'modems' ? 'text-indigo-600' : 'text-blue-600';
                        const icon = btnEl.querySelector('svg, i');
                        
                        if (isTab) {
                            btnEl.classList.add(activeColor);
                            btnEl.classList.remove('text-slate-500');
                            if (icon) {
                                icon.classList.remove('stroke-[1.5]');
                                icon.classList.add('stroke-2');
                            }
                        } else {
                            btnEl.classList.remove('text-blue-600', 'text-indigo-600');
                            btnEl.classList.add('text-slate-500');
                            if (icon) {
                                icon.classList.remove('stroke-2');
                                icon.classList.add('stroke-[1.5]');
                            }
                        }
                    }
                });
                lucide.createIcons();
            } catch (e) {
                console.warn("Sekme ikon geçişi atlandı", e);
            }
        }

        function getStatusInfo(status) {
            switch(status) {
                case 'Tamamlandı': return { color: 'bg-emerald-100 text-emerald-800 border-emerald-200', icon: 'check-circle' };
                case 'Devam Ediyor': return { color: 'bg-blue-100 text-blue-800 border-blue-200', icon: 'activity' };
                case 'Bekliyor': return { color: 'bg-amber-100 text-amber-800 border-amber-200', icon: 'clock' };
                default: return { color: 'bg-gray-100 text-gray-800 border-gray-200', icon: 'circle' };
            }
        }

        function formatDateLabel(dateString) {
            if (dateString === 'Tarihsiz') return dateString;
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('tr-TR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            } catch {
                return dateString;
            }
        }

        // --- 4. MODEM SEKME FONKSİYONLARI ---
        
        function populateModemSelect() {
            const optionsHtml = records
                .filter(r => r.vakaNo) 
                .map(r => {
                    const islemYapilmis = r.iadeModemNo ? ' ✓ (Modem Kayıtlı)' : '';
                    return `<option value="${r.id}">${r.vakaNo} - ${r.musteri} ${islemYapilmis}</option>`;
                }).join('');
            ui.modemVakaSelect.innerHTML = '<option value="">Önce Vaka Seçin...</option>' + optionsHtml;
        }

        function renderModems() {
            const modemRecords = records.filter(r => r.iadeModemNo);
            ui.modemCountBadge.textContent = `${modemRecords.length} Modem`;

            if (modemRecords.length === 0) {
                ui.modemsContainer.innerHTML = `
                    <div class="text-center py-10 bg-white rounded-xl border border-slate-200 border-dashed">
                        <i data-lucide="router" class="h-10 w-10 text-slate-300 mx-auto mb-3"></i>
                        <h3 class="text-base font-medium text-slate-900">Modem İşlemi Yok</h3>
                        <p class="text-sm text-slate-500 mt-1">Henüz hiçbir vakaya iade veya değişim modemi kaydetmediniz.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            let html = '';
            modemRecords.forEach(record => {
                const isIade = record.iadeModemTip === 'İade Alındı';
                const tipColor = isIade ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-indigo-50 text-indigo-700 border-indigo-200';
                
                html += `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 transition-all">
                        <div class="flex justify-between items-start mb-2">
                            <span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-semibold border ${tipColor}">
                                ${record.iadeModemTip}
                            </span>
                            <span class="text-xs text-slate-400 font-medium">${formatDateLabel(record.tarih)}</span>
                        </div>
                        
                        <div class="flex items-center space-x-2 mb-2 bg-slate-50 p-2 rounded border border-slate-100">
                            <i data-lucide="router" class="w-5 h-5 text-slate-500"></i>
                            <span class="font-mono font-bold text-slate-800 text-sm tracking-wide">${record.iadeModemNo}</span>
                        </div>
                        
                        ${record.iadeModemLink ? `
                        <div class="mb-3">
                            <a href="${record.iadeModemLink.startsWith('http') ? record.iadeModemLink : 'https://' + record.iadeModemLink}" target="_blank" class="inline-flex items-center text-xs font-medium text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 px-2.5 py-1.5 rounded border border-indigo-200 transition-colors">
                                <i data-lucide="external-link" class="w-3.5 h-3.5 mr-1.5"></i> Kayıtlı Linke Git
                            </a>
                        </div>
                        ` : ''}
                        
                        <p class="text-xs text-slate-600 mb-3 flex items-center">
                            <i data-lucide="briefcase" class="w-3.5 h-3.5 mr-1.5 text-slate-400"></i> 
                            Vaka: ${record.vakaNo} - <span class="truncate ml-1 font-medium">${record.musteri}</span>
                        </p>
                        
                        <div class="flex justify-end pt-2 border-t border-slate-100">
                             <button data-action="remove-modem" data-id="${record.id}" class="text-red-500 hover:text-red-700 flex items-center text-xs font-medium transition-colors p-1 hover:bg-red-50 rounded">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5 mr-1"></i> Modem Kaydını Sil
                             </button>
                        </div>
                    </div>
                `;
            });
            ui.modemsContainer.innerHTML = html;
            lucide.createIcons();
        }

        // --- 5. Render (Ana Liste Çizdirme) ---
        function renderRecords() {
            const filtered = records.filter(record => 
                (record.vakaNo && record.vakaNo.toLowerCase().includes(searchTerm.toLowerCase())) ||
                (record.evrakNo && record.evrakNo.toLowerCase().includes(searchTerm.toLowerCase())) ||
                (record.musteri && record.musteri.toLowerCase().includes(searchTerm.toLowerCase()))
            );

            const groups = {};
            filtered.forEach(record => {
                const date = record.tarih || 'Tarihsiz';
                if (!groups[date]) groups[date] = [];
                groups[date].push(record);
            });

            const groupedRecords = Object.keys(groups)
                .sort((a, b) => new Date(b) - new Date(a))
                .map(date => ({ date, records: groups[date] }));

            if (groupedRecords.length === 0) {
                ui.recordsContainer.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-xl border border-slate-200 border-dashed">
                        <i data-lucide="file-text" class="h-12 w-12 text-slate-300 mx-auto mb-3"></i>
                        <h3 class="text-lg font-medium text-slate-900">Kayıt Bulunamadı</h3>
                        <p class="text-slate-500 mt-1">${searchTerm ? 'Aramanıza uygun kayıt yok.' : 'Henüz hiç iş kaydetmediniz.'}</p>
                        ${!searchTerm ? `<button onclick="document.getElementById('nav-btn-add').click()" class="mt-4 px-4 py-2 bg-blue-50 text-blue-700 rounded-lg font-medium text-sm hover:bg-blue-100 transition-colors">İlk Kaydı Oluştur</button>` : ''}
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            let html = '';
            groupedRecords.forEach(group => {
                html += `
                    <div class="space-y-3">
                        <div class="sticky top-0 z-10 bg-slate-50/95 backdrop-blur py-2 border-b border-slate-200">
                            <h2 class="text-sm font-bold text-slate-700 flex items-center">
                                <i data-lucide="calendar" class="h-4 w-4 mr-2 text-blue-600"></i>
                                ${formatDateLabel(group.date)}
                                <span class="ml-2 text-xs font-normal text-slate-500 bg-slate-200 px-2 py-0.5 rounded-full">
                                    ${group.records.length} İşlem
                                </span>
                            </h2>
                        </div>
                `;

                group.records.forEach(record => {
                    const statusInfo = getStatusInfo(record.durum);
                    const timeString = new Date(record.createdAt).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
                    
                    html += `
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden transition-all hover:shadow-md">
                            <div class="p-4">
                                <div class="flex justify-between items-start mb-2">
                                    <div class="flex items-center space-x-2">
                                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-semibold bg-slate-100 text-slate-800 border border-slate-200">
                                            Vaka: ${record.vakaNo || 'Belirtilmedi'}
                                        </span>
                                    </div>
                                    <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium border ${statusInfo.color}">
                                        <i data-lucide="${statusInfo.icon}" class="w-3.5 h-3.5 mr-1"></i>
                                        ${record.durum}
                                    </span>
                                </div>
                                <h3 class="text-lg font-bold text-slate-800 mb-1 flex items-center">
                                    <i data-lucide="map-pin" class="w-4 h-4 text-slate-400 mr-1.5"></i>
                                    ${record.musteri || 'İsimsiz Müşteri/Lokasyon'}
                                </h3>
                                <p class="text-slate-600 text-sm mb-3 line-clamp-2">${record.aciklama}</p>

                                ${record.iadeModemNo ? `
                                <div class="bg-indigo-50 rounded p-2 mb-3 border border-indigo-100 flex items-center justify-between">
                                    <div class="flex items-center">
                                        <i data-lucide="router" class="w-4 h-4 text-indigo-500 mr-2"></i>
                                        <span class="text-xs text-indigo-700 font-medium">${record.iadeModemTip}:</span>
                                        <span class="text-xs font-mono font-bold text-slate-800 ml-1 bg-white px-1.5 py-0.5 rounded border border-indigo-200">${record.iadeModemNo}</span>
                                    </div>
                                    ${record.iadeModemLink ? `
                                        <a href="${record.iadeModemLink.startsWith('http') ? record.iadeModemLink : 'https://' + record.iadeModemLink}" target="_blank" class="text-[10px] bg-indigo-600 text-white px-2 py-1 rounded hover:bg-indigo-700 transition-colors flex items-center">
                                            Link <i data-lucide="external-link" class="w-3 h-3 ml-1"></i>
                                        </a>
                                    ` : ''}
                                </div>` : ''}

                                <div class="grid grid-cols-2 gap-2 mt-4 pt-3 border-t border-slate-100">
                                    <div class="flex items-center text-xs text-slate-500">
                                        <i data-lucide="clock" class="w-3.5 h-3.5 mr-1.5"></i>
                                        ${timeString}
                                    </div>
                                    ${record.evrakNo ? `
                                    <div class="flex items-center text-xs text-slate-500 justify-end">
                                        <i data-lucide="file-text" class="w-3.5 h-3.5 mr-1.5"></i>
                                        Evrak: ${record.evrakNo}
                                    </div>` : ''}
                                </div>
                            </div>
                            
                            <div class="bg-slate-50 px-4 py-2 flex justify-between items-center border-t border-slate-100">
                                <button data-action="edit-record" data-id="${record.id}" class="text-blue-600 hover:text-blue-800 flex items-center text-xs font-medium transition-colors px-2 py-1 rounded hover:bg-blue-50">
                                    <i data-lucide="edit-2" class="w-3.5 h-3.5 mr-1"></i> Düzenle
                                </button>
                                
                                <div>
                                    ${deletingId === record.id ? `
                                        <div class="flex items-center space-x-3">
                                            <span class="text-xs text-slate-500 font-medium">Silinsin mi?</span>
                                            <button data-action="cancel-delete" class="text-slate-500 hover:text-slate-700 text-xs font-medium px-2 py-1 rounded hover:bg-slate-200 transition-colors">İptal</button>
                                            <button data-action="confirm-delete" data-id="${record.id}" class="text-white bg-red-500 hover:bg-red-600 text-xs font-medium px-2 py-1 rounded transition-colors">Evet, Sil</button>
                                        </div>
                                    ` : `
                                        <button data-action="request-delete" data-id="${record.id}" class="text-red-500 hover:text-red-700 flex items-center text-xs font-medium transition-colors px-2 py-1 rounded hover:bg-red-50">
                                            <i data-lucide="trash-2" class="w-3.5 h-3.5 mr-1"></i> Sil
                                        </button>
                                    `}
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            });

            ui.recordsContainer.innerHTML = html;
            lucide.createIcons();
        }

        // --- 6. Olay Dinleyicileri ---
        ui.navBtnList.addEventListener('click', () => switchTab('list'));
        ui.navBtnAdd.addEventListener('click', () => switchTab('add'));
        ui.navBtnModems.addEventListener('click', () => switchTab('modems'));

        ui.searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            if (searchTerm) ui.clearSearchBtn.classList.remove('hidden');
            else ui.clearSearchBtn.classList.add('hidden');
            renderRecords();
        });

        ui.clearSearchBtn.addEventListener('click', () => {
            ui.searchInput.value = '';
            searchTerm = '';
            ui.clearSearchBtn.classList.add('hidden');
            renderRecords();
        });

        // Düzenleme Modalı Kapatma İşlemleri
        const closeEditModal = () => {
            ui.editModal.classList.add('hidden');
            ui.editModal.classList.remove('flex');
            editingId = null;
        };
        ui.cancelEditBtn.addEventListener('click', closeEditModal);
        ui.cancelEditBtnTop.addEventListener('click', closeEditModal);

        // Düzenleme Formunu Gönderme
        ui.editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser || !editingId) return;

            const originalBtnHtml = ui.editSubmitBtn.innerHTML;
            ui.editSubmitBtn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>';
            ui.editSubmitBtn.disabled = true;

            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'saha_gorevleri', editingId);
                await updateDoc(docRef, {
                    vakaNo: ui.editVaka.value,
                    tarih: ui.editTarih.value,
                    musteri: ui.editMusteri.value,
                    aciklama: ui.editAciklama.value,
                    evrakNo: ui.editEvrak.value,
                    durum: ui.editDurum.value
                });
                closeEditModal();
            } catch (error) {
                console.error("Güncelleme hatası:", error);
                alert("Güncellenemedi! Hata Detayı: " + error.message);
            } finally {
                ui.editSubmitBtn.innerHTML = originalBtnHtml;
                ui.editSubmitBtn.disabled = false;
            }
        });

        // Yeni Vaka Formu Gönderme
        ui.addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            
            const originalBtnHtml = ui.submitBtn.innerHTML;
            ui.submitBtn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>';
            ui.submitBtn.disabled = true;

            try {
                const newId = Date.now().toString();
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'saha_gorevleri', newId);
                
                await setDoc(docRef, {
                    vakaNo: ui.inpVaka.value,
                    tarih: ui.inpTarih.value,
                    musteri: ui.inpMusteri.value,
                    aciklama: ui.inpAciklama.value,
                    evrakNo: ui.inpEvrak.value,
                    durum: ui.inpDurum.value,
                    createdAt: Date.now(),
                    createdBy: currentUser.uid 
                });

                ui.addForm.reset();
                ui.inpTarih.value = new Date().toISOString().split('T')[0];
                switchTab('list');
                
            } catch (error) {
                console.error("Kaydetme hatası:", error);
                alert("Kaydedilemedi! Hata Detayı: " + error.message);
            } finally {
                ui.submitBtn.innerHTML = originalBtnHtml;
                ui.submitBtn.disabled = false;
                lucide.createIcons();
            }
        });

        // Modem Formu Gönderme (Mevcut Vakayı Güncelleme)
        ui.modemForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;
            
            const vakaId = ui.modemVakaSelect.value;
            if (!vakaId) {
                alert("Lütfen önce listeden bir vaka seçin!");
                return;
            }

            const originalBtnHtml = ui.modemSubmitBtn.innerHTML;
            ui.modemSubmitBtn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>';
            ui.modemSubmitBtn.disabled = true;

            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'saha_gorevleri', vakaId);
                
                await updateDoc(docRef, {
                    iadeModemNo: ui.modemSeri.value,
                    iadeModemTip: ui.modemTip.value,
                    iadeModemLink: ui.modemLink.value,
                    modemAddedAt: Date.now()
                });

                ui.modemForm.reset();
                alert("Modem başarıyla vakaya eklendi!");
                
            } catch (error) {
                console.error("Modem kaydetme hatası:", error);
                alert("Kaydedilemedi! Hata Detayı: " + error.message);
            } finally {
                ui.modemSubmitBtn.innerHTML = originalBtnHtml;
                ui.modemSubmitBtn.disabled = false;
                lucide.createIcons();
            }
        });

        // Silme İşlemleri
        ui.recordsContainer.addEventListener('click', async (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;

            const action = btn.dataset.action;
            const id = btn.dataset.id;

            if (action === 'edit-record') {
                const recordToEdit = records.find(r => r.id === id);
                if (recordToEdit) {
                    editingId = id;
                    ui.editVaka.value = recordToEdit.vakaNo || '';
                    ui.editTarih.value = recordToEdit.tarih || '';
                    ui.editMusteri.value = recordToEdit.musteri || '';
                    ui.editAciklama.value = recordToEdit.aciklama || '';
                    ui.editEvrak.value = recordToEdit.evrakNo || '';
                    ui.editDurum.value = recordToEdit.durum || 'Tamamlandı';
                    
                    ui.editModal.classList.remove('hidden');
                    ui.editModal.classList.add('flex');
                }
            } else if (action === 'request-delete') {
                deletingId = id;
                renderRecords();
            } else if (action === 'cancel-delete') {
                deletingId = null;
                renderRecords();
            } else if (action === 'confirm-delete') {
                if (!currentUser) return;
                btn.innerHTML = '<div class="animate-spin rounded-full h-3 w-3 border-b-2 border-white"></div>';
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'saha_gorevleri', id));
                    deletingId = null;
                } catch (error) {
                    console.error("Silme hatası:", error);
                    alert("Silinemedi! Hata: " + error.message);
                    deletingId = null;
                    renderRecords();
                }
            }
        });

        // Modem Kaydını Silme İşlemi (Vakayı silmez, sadece vakanın içindeki modemi siler)
        ui.modemsContainer.addEventListener('click', async (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;

            if (btn.dataset.action === 'remove-modem') {
                if (!currentUser) return;
                
                const onayla = confirm("Bu modemi vakadan kaldırmak istediğinize emin misiniz? (Vaka silinmez, sadece modem kaydı silinir)");
                if (!onayla) return;

                btn.innerHTML = '<div class="animate-spin rounded-full h-3 w-3 border-b-2 border-red-500 mx-auto"></div>';
                
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'saha_gorevleri', btn.dataset.id);
                    await updateDoc(docRef, {
                        iadeModemNo: null,
                        iadeModemTip: null,
                        iadeModemLink: null,
                        modemAddedAt: null
                    });
                } catch (error) {
                    console.error("Modem silme hatası:", error);
                    alert("Modem kaydı silinemedi! Hata: " + error.message);
                    renderModems(); // Hata olursa listeyi geri yükle
                }
            }
        });
    </script>
</body>
</html>
